name: 'Setup Node and pnpm'
description: 'Checks out code, sets up Node, pnpm, and installs dependencies'

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v3
      with:
        version: 10
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'
    - run: pnpm install --frozen-lockfile
      shell: bash
